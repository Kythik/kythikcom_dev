<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Favicons -->
  <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/images/favicon/favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/images/favicon/apple-touch-icon.png" />
  <link rel="manifest" href="/site.webmanifest" />
  <meta name="theme-color" content="#04080F" />
  <title>Torchlight Infinite — Kythik Hub</title>
  <meta name="description" content="Torchlight Infinite farm strategies, builds, the Clockwork Ballet calculator, and live ARPG commentary from Kythik (kythikx)." />
  <link rel="stylesheet" href="/styles.css" />
  <link rel="stylesheet" href="/shared/header-additions.css" />
  <style>
    @media (max-width: 700px) {
      .main { padding: 0 16px; }
      .tli-hero { padding: 28px 0 20px; }
    }
  </style>
</head>
<body>

  <div class="page-bg-img"></div>

  <svg class="hex-bg" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <defs>
      <pattern id="hexGrid" width="50" height="84" patternUnits="userSpaceOnUse">
        <polygon points="25,0 50,14 50,42 25,56 0,42 0,14"   fill="none" stroke="#1A3055" stroke-width="0.8"/>
        <polygon points="0,42 25,56 25,84 0,98 -25,84 -25,56" fill="none" stroke="#1A3055" stroke-width="0.8"/>
        <polygon points="50,42 75,56 75,84 50,98 25,84 25,56"  fill="none" stroke="#1A3055" stroke-width="0.8"/>
      </pattern>
    </defs>
    <rect width="100%" height="100%" fill="url(#hexGrid)"/>
  </svg>

  <!-- ── STICKY HEADER ── -->
  <div id="site-header" data-active-game="torchlight"></div>

  <main class="main">

    <!-- ── PAGE HERO ── -->
    <div class="tli-hero" style="text-align:center;padding:48px 0 32px">
      <h1 class="display display--lg" style="font-size:clamp(26px,6vw,42px);margin:0"><span class="accent">Torchlight Infinite</span></h1>
      <div class="kicker" id="heroSeason" style="margin-top:10px;opacity:0.7"></div>
    </div>

    <!-- ── FEATURED CAROUSEL ── -->
    <div class="featured-section" id="tliCarousel" style="display:none">
      <div class="featured-header">
        <div class="featured-label">Featured</div>
        <div class="featured-nav">
          <button class="featured-btn" onclick="KythikCarousel.nav('tliCarousel', -1)" aria-label="Previous">‹</button>
          <span class="featured-counter" id="tliCarouselCounter"></span>
          <button class="featured-btn" onclick="KythikCarousel.nav('tliCarousel',  1)" aria-label="Next">›</button>
        </div>
      </div>
      <div class="featured-track" id="tliCarouselTrack"></div>
    </div>

    <!-- ── RESOURCES (populated by content.js) ── -->
    <section class="hub-game-section" id="resourcesSection" style="display:none">
      <div class="hub-game-header">
        <div class="hub-game-title">Resources</div>
      </div>
      <div class="grid" id="resourcesGrid"></div>
    </section>

    <!-- ── OFFICIAL YOUTUBE VIDEOS (populated by content.js) ── -->
    <section class="hub-game-section" id="ytOfficialSection" style="display:none">
      <div class="hub-game-header" id="ytOfficialHeader"></div>
      <div class="grid" id="ytOfficialGrid"></div>
    </section>

    <!-- ── KYTHIK YOUTUBE VIDEOS (populated by content.js) ── -->
    <section class="hub-game-section" id="ytKythikSection" style="display:none">
      <div class="hub-game-header" id="ytKythikHeader"></div>
      <div class="grid" id="ytKythikGrid"></div>
    </section>

  </main>

  <div id="site-footer"></div>

  <script src="/shared/header.js"></script>
  <script src="/shared/footer.js"></script>
  <script src="/shared/shared-carousel.js"></script>
  <script src="/torchlight/content.js"></script>
  <!-- Vercel Analytics -->
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
  <!-- Vercel Speed Insights -->
  <script>
    window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/speed-insights/script.js"></script>

</body>
</html>
