<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="keywords" content="Kythik, KythikX, Kyth, kythik streamer, kythikx twitch, kythik twitch streamer, kythik arpg, Torchlight Infinite, Torchlight Infinite builds, Torchlight Infinite farm, Torchlight Infinite guide 2024, Torchlight Infinite guide 2025, TLI farm guide, TLI builds, TLI strategy, TLI season 12, ARPG builds, ARPG farm guide, ARPG strategy, ARPG streamer, ARPG Twitch streamer, ARPG commentary, ARPG loot game, ARPG tier list, action RPG builds, action RPG streamer, Path of Exile alternative, PoE like games, Path of Exile 2 alternative, best ARPG 2024, best ARPG 2025, Diablo IV builds, Diablo 4 streamer, Diablo alternative, Hero Siege, Dwarven Realms, loot game builds, loot game streamer, hack and slash builds, hack and slash streamer, Twitch ARPG streamer, gaming streamer builds, farm strategy guide, endgame builds, boss farming guide, speed farming builds, currency farming ARPG" />
  <meta property="og:title" content="Kythik — Torchlight Infinite Farm Builds & ARPG Strategy" />
  <meta property="og:description" content="Your source for Torchlight Infinite farm strategies, builds, and guides — plus live ARPG commentary from Kythik." />

  <link rel="stylesheet" href="/styles.css" />
  <link rel="stylesheet" href="/shared/header-additions.css" />
  <link rel="stylesheet" href="/torchlight/strats/strats_styles.css" />
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "Kythik",
    "alternateName": ["KythikX", "Kyth", "kythikx"],
    "url": "https://kythik.com",
    "description": "Torchlight Infinite farm builds, ARPG strategies, and live commentary from Kythik.",
    "author": {
      "@type": "Person",
      "name": "Kythik",
      "alternateName": "kythikx",
      "url": "https://twitch.tv/kythikx"
    }
  }
  </script>
</head>
<body>

  <!-- ── PAGE BACKGROUND IMAGE ── -->
  <div class="page-bg-img"></div>

  <!-- ── HEX BACKGROUND ── -->
  <svg class="hex-bg" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <defs>
      <pattern id="hexGrid" width="50" height="84" patternUnits="userSpaceOnUse">
        <!-- Center hex -->
        <polygon points="25,0 50,14 50,42 25,56 0,42 0,14"
                 fill="none" stroke="#1A3055" stroke-width="0.8"/>
        <!-- Staggered row hex — left edge -->
        <polygon points="0,42 25,56 25,84 0,98 -25,84 -25,56"
                 fill="none" stroke="#1A3055" stroke-width="0.8"/>
        <!-- Staggered row hex — right edge -->
        <polygon points="50,42 75,56 75,84 50,98 25,84 25,56"
                 fill="none" stroke="#1A3055" stroke-width="0.8"/>
      </pattern>
    </defs>
    <rect width="100%" height="100%" fill="url(#hexGrid)"/>
  </svg>

  <!-- ── STICKY HEADER ── -->
  <div id="site-header" data-active-game="torchlight"></div>

  <!-- ── STRATEGY DATABASE ── -->
  <main class="main">
    <!-- ── PAGE TITLE ── -->
    <div class="page-title">
      <h1 class="display display--lg"><span class="accent">Torchlight Infinite</span></h1>
    </div>

    <!-- ── FEATURED SECTION ── -->
    <div class="featured-section" id="featuredSection" style="display:none">
      <div class="featured-header">
        <div class="featured-label">Featured Strategy</div>
        <div class="featured-nav">
          <button class="featured-btn" id="featPrev" onclick="featNav(-1)" aria-label="Previous">‹</button>
          <span class="featured-counter" id="featCounter"></span>
          <button class="featured-btn" id="featNext" onclick="featNav(1)" aria-label="Next">›</button>
        </div>
      </div>
      <div class="featured-track" id="featuredTrack"></div>
    </div>

    <div class="db-header">
      <div></div>
      <div class="db-count" id="stratCount">Loading...</div>
    </div>

    <div class="filters">
      <input class="search" type="text" id="searchInput" placeholder="Search strategies, builds, authors..." aria-label="Search strategies" />
      <button class="pill active" data-filter="all">All</button>
      <button class="pill" data-filter="Farms">Farms</button>
      <button class="pill" data-filter="Builds">Builds</button>
    </div>

    <div class="tag-filter-row" id="tagFilters"></div>

    <div class="grid-frame">
      <div class="grid" id="stratGrid">
        <div class="card"><div class="card-inner">
          <div class="skeleton" style="height:16px;width:55%;margin-bottom:14px;"></div>
          <div class="skeleton" style="height:13px;width:100%;margin-bottom:7px;"></div>
          <div class="skeleton" style="height:13px;width:75%;"></div>
        </div></div>
        <div class="card"><div class="card-inner">
          <div class="skeleton" style="height:16px;width:65%;margin-bottom:14px;"></div>
          <div class="skeleton" style="height:13px;width:100%;margin-bottom:7px;"></div>
          <div class="skeleton" style="height:13px;width:60%;"></div>
        </div></div>
        <div class="card"><div class="card-inner">
          <div class="skeleton" style="height:16px;width:50%;margin-bottom:14px;"></div>
          <div class="skeleton" style="height:13px;width:100%;margin-bottom:7px;"></div>
          <div class="skeleton" style="height:13px;width:80%;"></div>
        </div></div>
      </div>
    </div>
  </main>

  <div class="footer-sync" id="lastSynced">Strategies last synced from Discord...</div>

  <div id="site-footer"></div>

  <!-- ── FLOATING PLAYER ── -->
  <div id="floating-player"></div>

  <!-- ── MODAL ── -->
  <div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true">
    <div class="modal" id="modalContent"></div>
  </div>

  <!-- ── LIGHTBOX ── -->
  <div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <button class="lightbox-close" onclick="closeLightbox()" aria-label="Close">✕</button>
    <button class="lightbox-prev" id="lightboxPrev" onclick="lightboxNav(-1,event)" aria-label="Previous">‹</button>
    <button class="lightbox-next" id="lightboxNext" onclick="lightboxNav(1,event)" aria-label="Next">›</button>
    <img class="lightbox-img" id="lightboxImg" src="" alt="Strategy screenshot" />
    <div class="lightbox-counter" id="lightboxCounter"></div>
  </div>

  <div class="toast" id="toast" role="alert" aria-live="polite"></div>

  <script>
    const CONFIG = {
      TWITCH_CHANNEL: 'kythikx',
      VERCEL_DOMAIN:  'kythik.com',
    };
    // player.js handles /api/twitch — skip header.js default check
    window.kythikSkipDefaultLiveCheck = true;
  </script>
  <script src="/shared/header.js"></script>
  <script src="/shared/footer.js"></script>
  <script src="/shared/player.js"></script>
  <script src="/torchlight/strats/app.js"></script>
  <!-- Vercel Analytics -->
  <script defer src="/_vercel/insights/script.js"></script>
  <!-- Vercel Speed Insights -->
  <script defer src="/_vercel/speed-insights/script.js"></script>
</body>
</html>
